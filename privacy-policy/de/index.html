<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datenschutzerklärung – Lupine Connect</title>
  </head>
  <body>
    <p><a href="../../">← Zurück</a> | <a href="../en/">English</a></p>
    <div id="content">Wird geladen…</div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      fetch("../../assets/privacy-policy.de.md")
        .then(function (response) {
          if (!response.ok) {
            throw new Error("Datenschutzerklärung konnte nicht geladen werden.");
          }
          return response.text();
        })
        .then(function (text) {
          document.getElementById("content").innerHTML = marked.parse(text);
        })
        .catch(function (error) {
          document.getElementById("content").textContent = error.message;
        });
    </script>
  </body>
</html>
